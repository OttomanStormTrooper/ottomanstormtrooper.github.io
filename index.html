<!-- Save as terminal-chat-demo.html and open in a browser -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Terminal Chat — Demo</title>
<style>
  :root{
    --bg:#020b06;
    --panel:#00120a;
    --accent:#00ff66;
    --muted:#00a36a;
    --glass: rgba(255,255,255,0.02);
  }
  html,body{height:100%;margin:0;font-family: "Courier New", Courier, monospace;background:linear-gradient(180deg,var(--bg),#00110a);}
  .wrap{max-width:900px;margin:30px auto;padding:18px;border-radius:8px;background:linear-gradient(180deg,var(--panel),#02150e);box-shadow:0 8px 30px rgba(0,0,0,0.6);color:var(--accent);}
  header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .logo{width:48px;height:48px;border-radius:6px;background:linear-gradient(135deg,#00332a,#005b3f);display:grid;place-items:center;font-weight:700;color:#001;}
  h1{font-size:1.05rem;margin:0;color:var(--accent)}
  .term{height:60vh;min-height:360px;background:#000;border-radius:6px;padding:14px;overflow:auto;box-shadow:inset 0 0 40px rgba(0,255,120,0.02);color:var(--accent);font-size:15px;line-height:1.4;}
  .line{white-space:pre-wrap}
  .sys{color:var(--muted)}
  .input-row{display:flex;gap:8px;align-items:center;margin-top:12px}
  .prompt{width:72px;flex-shrink:0;color:var(--accent);opacity:0.95}
  .cmdline{flex:1;background:transparent;border:1px solid rgba(0,255,120,0.06);padding:10px 12px;border-radius:6px;color:var(--accent);outline:none;font-family:inherit}
  .cmdline::placeholder{color:rgba(0,255,120,0.25)}
  .btn{background:#00281d;border:1px solid rgba(0,255,120,0.06);color:var(--accent);padding:10px 12px;border-radius:6px;cursor:pointer}
  .cursor{display:inline-block;width:8px;height:18px;background:var(--accent);vertical-align:middle;margin-left:2px;animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:0}}
  .msg.me{color:#9fffd8}
  .msg.them{color:var(--accent)}
  .small{font-size:12px;opacity:0.7}
  .boot{font-size:12px;color:#89ffb4;margin-bottom:10px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">CMD</div>
    <div>
      <h1>Terminal Chat — Demo</h1>
      <div class="small">Type like a hacker. Press ↑ / ↓ for history. Type `/help` for commands.</div>
    </div>
  </header>

  <div id="term" class="term" tabindex="0" aria-label="Terminal chat output">
    <div class="boot sys" id="boot-area"></div>
    <!-- chat lines go here -->
  </div>

  <div class="input-row">
    <div class="prompt">guest@local:$</div>
    <input id="cmdline" class="cmdline" autocomplete="off" placeholder="Type message or command (e.g. /help)" />
    <button id="send" class="btn">SEND</button>
  </div>
</div>

<script>
/* Simple terminal-chat demo with typing effect, message history, and commands */
const term = document.getElementById('term');
const cmd = document.getElementById('cmdline');
const send = document.getElementById('send');
let history = [], histPos = null;

function appendLine(text, className='line'){
  const el = document.createElement('div');
  el.className = className;
  el.textContent = text;
  term.appendChild(el);
  term.scrollTop = term.scrollHeight;
  return el;
}

/* Boot / ASCII intro */
const bootText = [
  "INIT v0.9.2 — boot sequence starting...",
  "loading modules: [kernel] [net] [ui] [encrypt]",
  "network: listening on 127.0.0.1:xxxx",
  ">>> welcome, guest. type /help to begin"
];
(async function boot(){
  for (let l of bootText){
    await typeLine(l, 'boot sys');
    await sleep(220);
  }
})();

function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

async function typeLine(text, className='line', speed=6){
  const el = document.createElement('div');
  el.className = className;
  term.appendChild(el);
  term.scrollTop = term.scrollHeight;
  for (let i=0;i<text.length;i++){
    el.textContent += text[i];
    term.scrollTop = term.scrollHeight;
    await sleep(Math.random()*speed + speed);
  }
  return el;
}

/* simulate incoming messages occasionally for drama */
const fakeMessages = [
  "hey are you online?",
  "do you have the access codes?",
  "meeting at 0200 — be there",
  "that exploit worked, upload logs?",
  "watch the trace — reroute via tunnel 7"
];
setInterval(()=>{
  if (Math.random() < 0.35){
    const msg = fakeMessages[Math.floor(Math.random()*fakeMessages.length)];
    typeLine("them@remote:$ " + msg, 'line msg them');
  }
}, 4500);

/* send handler */
async function sendMsg(raw){
  raw = raw.trim();
  if (!raw) return;
  history.push(raw); histPos = null;
  if (raw.startsWith('/')) return handleCommand(raw);
  // show typed message with typing effect then echo
  await typeLine("guest@local:$ " + raw, 'line msg me');
  // "deliver" — simulated remote reply
  setTimeout(()=>typeLine("them@remote:$ " + "ack: " + raw.slice(0,80), 'line msg them'), 600 + Math.random()*900);
}

async function handleCommand(cmdLine){
  const parts = cmdLine.split(' ');
  const cmdName = parts[0].toLowerCase();
  if (cmdName === '/help'){
    await typeLine("/help — show commands", 'line sys');
    await typeLine("/clear — clear screen", 'line sys');
    await typeLine("/whoami — show username", 'line sys');
    await typeLine("/cls — same as /clear", 'line sys');
  } else if (cmdName === '/clear' || cmdName === '/cls'){
    term.innerHTML = '';
  } else if (cmdName === '/whoami'){
    await typeLine("guest (local) — privilege: user", 'line sys');
  } else {
    await typeLine("unknown command: " + cmdLine, 'line sys');
  }
}

/* UI controls: send button and enter key */
send.addEventListener('click', ()=>{ sendMsg(cmd.value); cmd.value=''; cmd.focus(); });
cmd.addEventListener('keydown', (e)=>{
  if (e.key === 'Enter'){ e.preventDefault(); sendMsg(cmd.value); cmd.value=''; }
  else if (e.key === 'ArrowUp' || e.key === 'ArrowDown'){
    // history navigation
    if (history.length === 0) return;
    if (histPos === null) histPos = history.length;
    if (e.key === 'ArrowUp'){ histPos = Math.max(0, histPos-1); cmd.value = history[histPos]; }
    else { histPos = Math.min(history.length-1, histPos+1); cmd.value = history[histPos] || ''; if (histPos === history.length-1) cmd.value = history[histPos]; }
    e.preventDefault();
  }
});

/* focus term to accept keyboard paste */
term.addEventListener('click', ()=>cmd.focus());
cmd.focus();
</script>
</body>
</html>
